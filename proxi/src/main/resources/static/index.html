<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci Service - Active/Passive</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --primary: #38bdf8;
            --accent: #818cf8;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 1.5rem; color: var(--primary); }
        input {
            width: 80%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: none;
            background: #334155;
            color: white;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        button {
            padding: 0.8rem 2rem;
            border-radius: 0.5rem;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        #response {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #0f172a;
            border-radius: 0.5rem;
            font-family: monospace;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fibonacci Solver</h1>
        <p>Enter the number of elements:</p>
        <input type="number" id="num" value="10" min="1">
        <br>
        <button onclick="calculate()">Calculate</button>
        <div id="response">Result will appear here...</div>
    </div>

    <script>
        function calculate() {
            const n = document.getElementById('num').value;
            const resDiv = document.getElementById('response');
            resDiv.innerHTML = "Computing...";
            
            fetch('/proxy/fibonacci?value=' + n)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        resDiv.innerHTML = `<span style="color:#f87171">Error: ${data.error}</span>`;
                    } else {
                        resDiv.innerHTML = `<strong>Value:</strong> ${data.value}<br><strong>Sequence:</strong> [${data.sequence.join(', ')}]`;
                    }
                })
                .catch(err => {
                    resDiv.innerHTML = `<span style="color:#f87171">Network Error: ${err.message}</span>`;
                });
        }
    </script>
</body>
</html>
